<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXTV Multi-Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo i {
            font-size: 1.5rem;
            color: var(--primary);
        }
        
        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .page-title {
            margin-bottom: 2rem;
        }
        
        .page-title h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .page-title p {
            color: var(--text-secondary);
        }
        
        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .bot-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .bot-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .bot-name {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .bot-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .bot-icon.fxtv { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .bot-icon.polymarket { background: linear-gradient(135deg, #10b981, #06b6d4); }
        .bot-icon.moltbook { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .bot-icon.auto-trading { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        
        .bot-title h3 {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .bot-title span {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        
        .status-badge.online {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .status-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }
        
        .status-badge.offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-badge.online .status-dot { background: var(--success); }
        .status-badge.warning .status-dot { background: var(--warning); }
        .status-badge.offline .status-dot { background: var(--danger); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .bot-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .stat {
            text-align: center;
            padding: 0.75rem;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .bot-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-secondary {
            background: var(--border);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: #475569;
        }
        
        .last-updated {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .refresh-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            margin-left: 0.5rem;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <h1>FXTV Dashboard</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html">Overview</a>
            <a href="bots.html" class="active">Bots</a>
            <a href="trades.html">Trades</a>
            <a href="analytics.html">Analytics</a>
        </nav>
    </header>
    
    <div class="container">
        <div class="page-title">
            <h2>Multi-Bot Dashboard</h2>
            <p>Monitor all trading bots and AI agents in real-time</p>
        </div>
        
        <div class="bots-grid" id="botsGrid">
            <!-- Bot cards will be loaded dynamically -->
        </div>
        
        <div class="last-updated">
            Last updated: <span id="lastUpdated">--</span>
            <button class="refresh-btn" onclick="loadBots()" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    
    <script>
        // Bot configuration
        const botsConfig = {
            fxtv: {
                name: 'FXTV Bot',
                type: 'Forex Trading',
                icon: 'fas fa-chart-line',
                iconClass: 'fxtv'
            },
            polymarket: {
                name: 'Polymarket',
                type: 'Crypto/Prediction',
                icon: 'fas fa-coins',
                iconClass: 'polymarket'
            },
            moltbook: {
                name: 'Moltbook AI',
                type: 'AI Agents',
                icon: 'fas fa-brain',
                iconClass: 'moltbook'
            },
            autoTrading: {
                name: 'Auto-Trading',
                type: 'Signal Bot',
                icon: 'fas fa-bolt',
                iconClass: 'auto-trading'
            }
        };
        
        // Load bot data from API
        async function loadBots() {
            const grid = document.getElementById('botsGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;"><div class="loading"></div></div>';
            
            try {
                // Try to fetch from API first
                let botsData = [];
                try {
                    const response = await fetch('/api/bots');
                    if (response.ok) {
                        botsData = await response.json();
                    }
                } catch (e) {
                    console.log('API not available, using fallback data');
                }
                
                // Fallback data if API fails
                if (botsData.length === 0) {
                    botsData = [
                        { id: 'fxtv', name: 'FXTV Bot', status: 'online', trades: 177, profit: '+2.4%', uptime: '99.2%' },
                        { id: 'polymarket', name: 'Polymarket', status: 'warning', trades: 0, profit: '0%', uptime: '98.5%', message: 'API reconnecting' },
                        { id: 'moltbook', name: 'Moltbook AI', status: 'online', agents: 561, profit: '+5.8%', uptime: '99.8%' },
                        { id: 'autoTrading', name: 'Auto-Trading', status: 'online', signals: 42, profit: '+1.2%', uptime: '99.5%' }
                    ];
                }
                
                grid.innerHTML = botsData.map(bot => createBotCard(bot)).join('');
                document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            } catch (error) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--danger);">
                    <i class="fas fa-exclamation-triangle"></i> Failed to load bots: ${error.message}
                </div>`;
            }
        }
        
        // Create bot card HTML
        function createBotCard(bot) {
            const config = botsConfig[bot.id] || { name: bot.name, type: 'Unknown', icon: 'fas fa-robot', iconClass: '' };
            const statusClass = bot.status === 'online' ? 'online' : bot.status === 'warning' ? 'warning' : 'offline';
            
            // Determine stats to show based on bot type
            let statsHtml = '';
            if (bot.trades !== undefined) {
                statsHtml += `
                    <div class="stat">
                        <div class="stat-value">${bot.trades}</div>
                        <div class="stat-label">Trades</div>
                    </div>
                `;
            }
            if (bot.agents !== undefined) {
                statsHtml += `
                    <div class="stat">
                        <div class="stat-value">${bot.agents}</div>
                        <div class="stat-label">Agents</div>
                    </div>
                `;
            }
            if (bot.signals !== undefined) {
                statsHtml += `
                    <div class="stat">
                        <div class="stat-value">${bot.signals}</div>
                        <div class="stat-label">Signals</div>
                    </div>
                `;
            }
            statsHtml += `
                <div class="stat">
                    <div class="stat-value" style="color: ${bot.profit?.startsWith('+') ? 'var(--success)' : bot.profit?.startsWith('-') ? 'var(--danger)' : 'var(--text-secondary)'}">${bot.profit || 'N/A'}</div>
                    <div class="stat-label">Profit</div>
                </div>
            `;
            
            return `
                <div class="bot-card">
                    <div class="bot-header">
                        <div class="bot-name">
                            <div class="bot-icon ${config.iconClass}">
                                <i class="${config.icon}"></i>
                            </div>
                            <div class="bot-title">
                                <h3>${config.name}</h3>
                                <span>${config.type}</span>
                            </div>
                        </div>
                        <div class="status-badge ${statusClass}">
                            <span class="status-dot"></span>
                            ${bot.status.toUpperCase()}
                        </div>
                    </div>
                    
                    <div class="bot-stats">
                        ${statsHtml}
                    </div>
                    
                    ${bot.message ? `<div style="margin-top: 0.75rem; padding: 0.5rem; background: rgba(245, 158, 11, 0.1); border-radius: 6px; font-size: 0.75rem; color: var(--warning);"><i class="fas fa-info-circle"></i> ${bot.message}</div>` : ''}
                    
                    <div class="bot-actions">
                        <button class="btn btn-primary" onclick="viewDetails('${bot.id}')">
                            <i class="fas fa-eye"></i> Details
                        </button>
                        <button class="btn btn-secondary" onclick="viewLogs('${bot.id}')">
                            <i class="fas fa-file-alt"></i> Logs
                        </button>
                    </div>
                </div>
            `;
        }
        
        function viewDetails(botId) {
            alert(`Viewing details for ${botId}`);
            // window.location.href = `/bot/${botId}`;
        }
        
        function viewLogs(botId) {
            alert(`Viewing logs for ${botId}`);
            // window.location.href = `/logs/${botId}`;
        }
        
        // Load on page load
        loadBots();
        
        // Auto-refresh every 30 seconds
        setInterval(loadBots, 30000);
    </script>
</body>
</html>
