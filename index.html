<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXTV Trading Dashboard - Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo i {
            font-size: 1.5rem;
            color: var(--primary);
        }
        
        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Stats Overview */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .stat-icon.blue { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .stat-icon.purple { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        
        .stat-info h3 {
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        .stat-info p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        /* Section styling */
        .section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .view-all {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.875rem;
        }
        
        /* Bot Status Table */
        .bot-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .bot-table th,
        .bot-table td {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.875rem;
        }
        
        .bot-table th {
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        
        .bot-table td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .bot-table tr:last-child td {
            border-bottom: none;
        }
        
        .bot-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .bot-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .bot-avatar.fxtv { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .bot-avatar.polymarket { background: linear-gradient(135deg, #10b981, #06b6d4); }
        .bot-avatar.moltbook { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .bot-avatar.auto { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        
        .bot-name-cell h4 {
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .bot-name-cell span {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }
        
        .status-badge.online {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .status-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }
        
        .status-badge.offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .status-badge.online .status-dot { background: var(--success); animation: pulse 2s infinite; }
        .status-badge.warning .status-dot { background: var(--warning); }
        .status-badge.offline .status-dot { background: var(--danger); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .profit-positive { color: var(--success); }
        .profit-negative { color: var(--danger); }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .action-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }
        
        .action-btn i {
            color: var(--primary);
            font-size: 1.25rem;
        }
        
        .action-btn span {
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        /* Last Updated */
        .last-updated {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .refresh-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <h1>FXTV Dashboard</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="active">Overview</a>
            <a href="bots.html">Bots</a>
            <a href="trades.html">Trades</a>
            <a href="analytics.html">Analytics</a>
        </nav>
    </header>
    
    <div class="container">
        <!-- Stats Overview -->
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-exchange-alt"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalTrades">177</h3>
                    <p>Total Trades</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="stat-info">
                    <h3 id="activeBots">3/4</h3>
                    <p>Active Bots</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalAgents">561</h3>
                    <p>AI Agents</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fas fa-chart-pie"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalProfit">+9.4%</h3>
                    <p>Combined Profit</p>
                </div>
            </div>
        </div>
        
        <!-- Bot Status Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-heartbeat"></i> Bot Status
                </h2>
                <a href="bots.html" class="view-all">View All →</a>
            </div>
            
            <table class="bot-table">
                <thead>
                    <tr>
                        <th>Bot</th>
                        <th>Status</th>
                        <th>Trades/Agents</th>
                        <th>Profit</th>
                        <th>Uptime</th>
                    </tr>
                </thead>
                <tbody id="botTableBody">
                    <!-- Filled dynamically -->
                </tbody>
            </table>
        </div>
        
        <!-- Quick Actions -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-bolt"></i> Quick Actions
                </h2>
            </div>
            
            <div class="quick-actions">
                <a href="bots.html" class="action-btn">
                    <i class="fas fa-robot"></i>
                    <span>Manage Bots</span>
                </a>
                <a href="trades.html" class="action-btn">
                    <i class="fas fa-list"></i>
                    <span>View Trades</span>
                </a>
                <a href="#" class="action-btn" onclick="refreshData(); return false;">
                    <i class="fas fa-sync"></i>
                    <span>Refresh Data</span>
                </a>
                <a href="https://t.me/FXTV_Trading_Bot" target="_blank" class="action-btn">
                    <i class="fab fa-telegram"></i>
                    <span>Telegram Bot</span>
                </a>
            </div>
        </div>
        
        <div class="last-updated">
            Last updated: <span id="lastUpdated">--</span>
            <button class="refresh-btn" onclick="refreshData()" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    
    <script>
        // Bot data configuration
        const botsData = [
            { id: 'fxtv', name: 'FXTV Bot', type: 'Forex', icon: 'fxtv', status: 'online', trades: 177, profit: '+2.4%', uptime: '99.2%' },
            { id: 'polymarket', name: 'Polymarket', type: 'Crypto', icon: 'polymarket', status: 'warning', trades: 0, profit: '0%', uptime: '98.5%', message: 'API reconnecting' },
            { id: 'moltbook', name: 'Moltbook AI', type: 'AI Agents', icon: 'moltbook', status: 'online', agents: 561, profit: '+5.8%', uptime: '99.8%' },
            { id: 'auto', name: 'Auto-Trading', type: 'Signals', icon: 'auto', status: 'online', signals: 42, profit: '+1.2%', uptime: '99.5%' }
        ];
        
        function renderBotTable() {
            const tbody = document.getElementById('botTableBody');
            tbody.innerHTML = botsData.map(bot => {
                const activityCount = bot.agents ? `${bot.agents} agents` : 
                                       bot.signals ? `${bot.signals} signals` : 
                                       `${bot.trades} trades`;
                const profitClass = bot.profit.startsWith('+') ? 'profit-positive' : 
                                   bot.profit.startsWith('-') ? 'profit-negative' : '';
                
                return `
                    <tr>
                        <td>
                            <div class="bot-cell">
                                <div class="bot-avatar ${bot.icon}">
                                    <i class="fas fa-${bot.icon === 'fxtv' ? 'chart-line' : bot.icon === 'polymarket' ? 'coins' : bot.icon === 'moltbook' ? 'brain' : 'bolt'}"></i>
                                </div>
                                <div class="bot-name-cell">
                                    <h4>${bot.name}</h4>
                                    <span>${bot.type}</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="status-badge ${bot.status}">
                                <span class="status-dot"></span>
                                ${bot.status.toUpperCase()}
                            </span>
                        </td>
                        <td>${activityCount}</td>
                        <td class="${profitClass}">${bot.profit}</td>
                        <td>${bot.uptime}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function refreshData() {
            // In a real implementation, this would fetch from API
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            
            // Animate refresh icon
            const icon = document.querySelector('.refresh-btn i');
            icon.style.animation = 'spin 1s linear';
            setTimeout(() => icon.style.animation = '', 1000);
        }
        
        // Initialize
        renderBotTable();
        refreshData();
        
        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
